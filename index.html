    <script src="resize.js"></script>
    <script src="scroll-nav.js"></script>
    <script>
        // Store default values
        const defaultValues = {};
        
        function applyStyle(elementId, property, value) {
            if (!value || value.trim() === '') return;
            
            let element;
            if (elementId === 'panel-container') {
                element = document.querySelector('.panel-container');
            } else {
                element = document.getElementById(elementId);
            }
            
            if (element) {
                const camelProperty = property.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
                element.style[camelProperty] = value;
            }
        }
        
        function resetStyle(inputId) {
            const defaultValue = defaultValues[inputId];
            if (!defaultValue) return;
            
            const input = document.getElementById(inputId);
            if (!input) return;
            
            // Parse the input ID to get element and property
            const parts = inputId.split('-');
            let elementId, property;
            
            if (parts[0] === 'container') {
                elementId = 'panel-container';
                property = parts.slice(1).join('-');
            } else if (parts[0] === 'panel1') {
                elementId = 'datasource';
                property = parts.slice(1).join('-');
            } else if (parts[0] === 'panel2') {
                elementId = 'configure';
                property = parts.slice(1).join('-');
            } else if (parts[0] === 'panel3') {
                elementId = 'visualization';
                property = parts.slice(1).join('-');
            }
            
            // Apply the default value
            input.value = defaultValue;
            applyStyle(elementId, property, defaultValue);
        }
        
        function loadCurrentValues() {
            const elements = {
                'container': document.querySelector('.panel-container'),
                'panel1': document.getElementById('datasource'),
                'panel2': document.getElementById('configure'),
                'panel3': document.getElementById('visualization'),
                'viz-card': document.getElementById('visualization-card'),
                'table-card': document.getElementById('table-card')
            };
            
            const properties = ['width', 'min-width', 'max-width', 'height', 'min-height', 'max-height'];
            
            Object.keys(elements).forEach(key => {
                const element = elements[key];
                if (!element) return;
                
                const computedStyle = window.getComputedStyle(element);
                
                properties.forEach(prop => {
                    const camelProp = prop.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
                    const value = computedStyle[camelProp];
                    const inputId = `${key}-${prop}`;
                    const input = document.getElementById(inputId);
                    
                    if (input && value) {
                        input.value = value;
                        defaultValues[inputId] = value;
                    }
                });
            });
        }
        
        // Load current values when page loads
        window.addEventListener('DOMContentLoaded', loadCurrentValues);
        
        // Toggle between layout modes
        function toggleLayoutMode(allowSideBySide) {
            const container = document.querySelector('.panel-container');
            const modeText = document.getElementById('layout-mode-text');
            
            if (allowSideBySide) {
                container.classList.remove('force-vertical');
                container.classList.add('allow-side-by-side');
                modeText.textContent = 'Allow Side-by-Side (224px)';
            } else {
                container.classList.remove('allow-side-by-side');
                container.classList.add('force-vertical');
                modeText.textContent = 'Force Vertical Stack';
            }
        }
        
        // Initialize with force-vertical mode
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.panel-container').classList.add('force-vertical');
        });
    </script>
